<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MoE Effect Catalog Browser</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f7f9;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #d1d5db;
      --accent: #2563eb;
      --warn: #92400e;
      --warn-bg: #fffbeb;
      --code-bg: #f3f4f6;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111827;
        --card: #1f2937;
        --text: #f9fafb;
        --muted: #9ca3af;
        --line: #374151;
        --accent: #60a5fa;
        --warn: #fbbf24;
        --warn-bg: #292218;
        --code-bg: #111827;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }
    header {
      padding: 20px 24px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--card);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    h1 { margin: 0 0 6px; font-size: 22px; }
    header p { margin: 0; color: var(--muted); font-size: 14px; }
    main { padding: 18px 24px 32px; max-width: 1280px; margin: 0 auto; }
    .notice {
      background: var(--warn-bg);
      color: var(--warn);
      border: 1px solid color-mix(in srgb, var(--warn) 35%, transparent);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 16px;
      font-size: 14px;
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 10px;
      align-items: end;
    }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    input, select, button, textarea {
      font: inherit;
      color: inherit;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      width: 100%;
    }
    button {
      cursor: pointer;
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      font-weight: 700;
    }
    button.secondary {
      background: transparent;
      color: var(--accent);
    }
    .col-2 { grid-column: span 2; }
    .col-3 { grid-column: span 3; }
    .col-4 { grid-column: span 4; }
    .col-5 { grid-column: span 5; }
    .col-6 { grid-column: span 6; }
    .col-12 { grid-column: span 12; }
    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
      .col-2, .col-3, .col-4, .col-5, .col-6, .col-12 { grid-column: span 1; }
      header { position: static; }
    }
    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      margin-top: 10px;
    }
    .pill {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      padding: 3px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: color-mix(in srgb, var(--card) 80%, var(--bg));
      white-space: nowrap;
    }
    .results {
      display: grid;
      grid-template-columns: minmax(320px, 460px) 1fr;
      gap: 16px;
      align-items: start;
    }
    @media (max-width: 980px) { .results { grid-template-columns: 1fr; } }
    .list { display: grid; gap: 10px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
    }
    .card.selected { outline: 2px solid var(--accent); }
    .card h3 { margin: 0 0 4px; font-size: 16px; }
    .card .meta { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
    .card .desc { font-size: 13px; color: var(--muted); white-space: pre-wrap; }
    .effects { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .effect-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 7px;
      border-radius: 999px;
      border: 1px solid var(--line);
      font-size: 12px;
      background: color-mix(in srgb, var(--accent) 8%, var(--card));
    }
    .muted { color: var(--muted); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border-bottom: 1px solid var(--line); padding: 6px 8px; vertical-align: top; text-align: left; }
    th { color: var(--muted); font-weight: 700; }
    code, pre {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: var(--code-bg);
      border-radius: 8px;
    }
    pre { padding: 10px; overflow: auto; max-height: 360px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .tab { width: auto; color: var(--accent); background: transparent; }
    .tab.active { color: white; background: var(--accent); }
    .detail-empty { color: var(--muted); text-align: center; padding: 48px 12px; }
  </style>
</head>
<body>
<header>
  <h1>MoE Effect Catalog Browser</h1>
  <p>MoE Forge抽出データを検索・確認するための安全な参照UIです。既存の計算結果には一切反映しません。</p>
</header>
<main>
  <div class="notice">
    この画面は「確認専用」です。MoE Forge由来データは reference / provisional 扱いで、公式DB・Wiki・実測と突合してから本採用します。
  </div>

  <section class="panel">
    <div class="grid">
      <div class="col-5">
        <label for="q">検索語</label>
        <input id="q" placeholder="例: バーサーク / キーン エッジ / テンガロン / 攻撃ディレイ" autocomplete="off" />
      </div>
      <div class="col-3">
        <label for="mode">検索対象</label>
        <select id="mode">
          <option value="all">全部</option>
          <option value="buff">Buff/効果カタログ</option>
          <option value="equipment">装備Buff索引</option>
        </select>
      </div>
      <div class="col-2">
        <label for="category">効果カテゴリ</label>
        <select id="category">
          <option value="all">全部</option>
          <option value="physical">物理</option>
          <option value="survival">生存</option>
          <option value="magic">魔法</option>
          <option value="resist">抵抗</option>
          <option value="utility">汎用</option>
          <option value="special">特殊</option>
        </select>
      </div>
      <div class="col-2">
        <label for="limit">表示件数</label>
        <select id="limit">
          <option>25</option>
          <option selected>50</option>
          <option>100</option>
          <option>200</option>
        </select>
      </div>
      <div class="col-3">
        <button id="search">検索</button>
      </div>
      <div class="col-3">
        <button id="clear" class="secondary">クリア</button>
      </div>
      <div class="col-6 muted" id="loadStatus">読み込み中...</div>
    </div>
    <div class="summary" id="summary"></div>
  </section>

  <section class="results">
    <div class="list" id="resultList"></div>
    <div class="card" id="detail">
      <div class="detail-empty">左の検索結果を選ぶと詳細が表示されます。</div>
    </div>
  </section>
</main>
<script type="module" src="./src/effects/effectCatalogBrowser.js"></script>
</body>
</html>
